apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: todo-app
type: Opaque
stringData:
  # Base64 encoding is not required for stringData
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/todo_db?schema=public"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "super_secret_jwt_key_for_dev_only"
  CHACHA20_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  # Replace these with real credentials in production!
  GOOGLE_CLIENT_ID: "your_google_client_id"
  GOOGLE_CLIENT_SECRET: "your_google_client_secret"
  GITHUB_CLIENT_ID: "your_github_client_id"
  GITHUB_CLIENT_SECRET: "your_github_client_secret"
  RAZORPAY_KEY_ID: "your_razorpay_key_id"
  RAZORPAY_KEY_SECRET: "your_razorpay_key_secret"
  NEXT_PUBLIC_API_URL: "http://api.todo.local"
  FRONTEND_URL: "http://todo.local"
